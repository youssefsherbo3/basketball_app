services:
  - type: web
    name: basketball-app
    env: node
    plan: free
    buildCommand: chmod +x ./build.sh && ./build.sh
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_STATIC
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
