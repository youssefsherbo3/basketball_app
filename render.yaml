services:
  - type: web
    name: basketball-app
    env: node
    plan: free
    buildCommand: chmod +x ./build.sh && ./build.sh
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # paste your Supabase connection string here after deploy
      - key: SESSION_SECRET
        sync: false   # set any long random string
