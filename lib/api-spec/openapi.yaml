openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Basketball attendance and player evaluation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: coaches
    description: Coach management
  - name: teams
    description: Team management
  - name: players
    description: Player management
  - name: sessions
    description: Training sessions
  - name: attendance
    description: Session attendance
  - name: criteria
    description: Evaluation criteria
  - name: reports
    description: Reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMe"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMe"
        "401":
          description: Not authenticated

  /coaches:
    get:
      operationId: listCoaches
      tags: [coaches]
      summary: List all coaches
      responses:
        "200":
          description: List of coaches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coach"
    post:
      operationId: createCoach
      tags: [coaches]
      summary: Create a coach (head_coach only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coach"

  /coaches/{id}:
    patch:
      operationId: updateCoach
      tags: [coaches]
      summary: Update a coach
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coach"
    delete:
      operationId: deleteCoach
      tags: [coaches]
      summary: Delete a coach
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /coaches/{id}/toggle:
    patch:
      operationId: toggleCoach
      tags: [coaches]
      summary: Toggle coach active status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coach"

  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a team (head_coach only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{id}:
    patch:
      operationId: updateTeam
      tags: [teams]
      summary: Update a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    delete:
      operationId: deleteTeam
      tags: [teams]
      summary: Delete a team (head_coach only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /teams/{id}/players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List players in a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Add a player to a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}:
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /players/{id}/toggle:
    patch:
      operationId: togglePlayer
      tags: [players]
      summary: Toggle player active status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /teams/{id}/sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List training sessions for a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingSession"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a training session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingSession"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session with attendance and evaluations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sessions/{id}/attendance:
    post:
      operationId: saveAttendance
      tags: [attendance]
      summary: Save attendance and evaluations for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"

  /criteria:
    get:
      operationId: listCriteria
      tags: [criteria]
      summary: List evaluation criteria
      responses:
        "200":
          description: List of criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Criterion"
    post:
      operationId: createCriterion
      tags: [criteria]
      summary: Create an evaluation criterion (head_coach only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriterionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Criterion"

  /criteria/{id}/toggle:
    patch:
      operationId: toggleCriterion
      tags: [criteria]
      summary: Toggle criterion active status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Criterion"

  /reports/team/{id}:
    post:
      operationId: getTeamReport
      tags: [reports]
      summary: Get attendance and evaluation report for a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportFilter"
      responses:
        "200":
          description: Team report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamReport"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [reports]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    UserMe:
      type: object
      required: [id, username, fullName, role, isActive]
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
        isActive:
          type: boolean

    Coach:
      type: object
      required: [id, username, fullName, role, isActive]
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
        isActive:
          type: boolean

    CoachInput:
      type: object
      required: [username, fullName, password]
      properties:
        username:
          type: string
        fullName:
          type: string
        password:
          type: string

    CoachUpdate:
      type: object
      properties:
        fullName:
          type: string
        password:
          type: string

    Team:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        ageCategory:
          type: ["string", "null"]
        coachId:
          type: ["integer", "null"]
        coachName:
          type: ["string", "null"]

    TeamInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        ageCategory:
          type: string
        coachId:
          type: ["integer", "null"]

    TeamUpdate:
      type: object
      properties:
        name:
          type: string
        ageCategory:
          type: string
        coachId:
          type: ["integer", "null"]

    Player:
      type: object
      required: [id, name, teamId, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        teamId:
          type: integer
        position:
          type: ["string", "null"]
        jerseyNumber:
          type: ["integer", "null"]
        isActive:
          type: boolean

    PlayerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        position:
          type: string
        jerseyNumber:
          type: ["integer", "null"]

    PlayerUpdate:
      type: object
      properties:
        name:
          type: string
        position:
          type: string
        jerseyNumber:
          type: ["integer", "null"]

    TrainingSession:
      type: object
      required: [id, teamId, date]
      properties:
        id:
          type: integer
        teamId:
          type: integer
        date:
          type: string
        notes:
          type: ["string", "null"]
        attendanceCount:
          type: integer

    SessionInput:
      type: object
      required: [date]
      properties:
        date:
          type: string
        notes:
          type: string

    PlayerAttendance:
      type: object
      required: [playerId, playerName, status]
      properties:
        playerId:
          type: integer
        playerName:
          type: string
        jerseyNumber:
          type: ["integer", "null"]
        status:
          type: string
        note:
          type: ["string", "null"]
        evaluations:
          type: array
          items:
            $ref: "#/components/schemas/PlayerEvaluation"

    PlayerEvaluation:
      type: object
      required: [criterionId, criterionName, score]
      properties:
        criterionId:
          type: integer
        criterionName:
          type: string
        score:
          type: integer

    SessionDetail:
      type: object
      required: [id, teamId, date, players, criteria]
      properties:
        id:
          type: integer
        teamId:
          type: integer
        date:
          type: string
        notes:
          type: ["string", "null"]
        players:
          type: array
          items:
            $ref: "#/components/schemas/PlayerAttendance"
        criteria:
          type: array
          items:
            $ref: "#/components/schemas/Criterion"

    AttendanceEntry:
      type: object
      required: [playerId, status]
      properties:
        playerId:
          type: integer
        status:
          type: string
        note:
          type: string
        scores:
          type: array
          items:
            $ref: "#/components/schemas/EvaluationScore"

    EvaluationScore:
      type: object
      required: [criterionId, score]
      properties:
        criterionId:
          type: integer
        score:
          type: integer

    AttendanceInput:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceEntry"

    Criterion:
      type: object
      required: [id, name, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        isActive:
          type: boolean

    CriterionInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    PlayerReport:
      type: object
      required: [playerId, playerName, totalSessions, present, absent, late, excused, attendancePct]
      properties:
        playerId:
          type: integer
        playerName:
          type: string
        jerseyNumber:
          type: ["integer", "null"]
        totalSessions:
          type: integer
        present:
          type: integer
        absent:
          type: integer
        late:
          type: integer
        excused:
          type: integer
        attendancePct:
          type: number
        overallAvg:
          type: ["number", "null"]
        criteriaAvgs:
          type: array
          items:
            $ref: "#/components/schemas/CriterionAvg"

    CriterionAvg:
      type: object
      required: [criterionId, criterionName]
      properties:
        criterionId:
          type: integer
        criterionName:
          type: string
        avg:
          type: ["number", "null"]

    TeamReport:
      type: object
      required: [teamId, teamName, totalSessions, criteria, players]
      properties:
        teamId:
          type: integer
        teamName:
          type: string
        totalSessions:
          type: integer
        criteria:
          type: array
          items:
            $ref: "#/components/schemas/Criterion"
        players:
          type: array
          items:
            $ref: "#/components/schemas/PlayerReport"

    ReportFilter:
      type: object
      properties:
        dateFrom:
          type: string
        dateTo:
          type: string

    TeamStat:
      type: object
      required: [teamId, teamName, sessionsCount, playersCount]
      properties:
        teamId:
          type: integer
        teamName:
          type: string
        ageCategory:
          type: ["string", "null"]
        coachName:
          type: ["string", "null"]
        sessionsCount:
          type: integer
        playersCount:
          type: integer

    DashboardStats:
      type: object
      required: [totalTeams, totalCoaches, totalPlayers, totalSessions, teams]
      properties:
        totalTeams:
          type: integer
        totalCoaches:
          type: integer
        totalPlayers:
          type: integer
        totalSessions:
          type: integer
        teams:
          type: array
          items:
            $ref: "#/components/schemas/TeamStat"
