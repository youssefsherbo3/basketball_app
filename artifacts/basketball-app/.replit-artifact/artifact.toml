kind = "web"
previewPath = "/"
title = "Basketball Attendance"
version = "1.0.0"
id = "artifacts/basketball-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19491

[services.development]
run = "pnpm --filter @workspace/basketball-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/basketball-app", "run", "build" ]
publicDir = "artifacts/basketball-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19491"
BASE_PATH = "/"
